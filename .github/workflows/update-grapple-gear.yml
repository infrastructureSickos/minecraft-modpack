name: Update Grapple Gear

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Grapple Gear version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - grapple-gear-updated

jobs:
  update:
    name: Update Grapple Gear in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update grapple-gear
        run: packwiz update grapple-gear

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update grapple-gear mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
