name: Update Surface Safety

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Surface Safety version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - surface-safety-updated

jobs:
  update:
    name: Update Surface Safety in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update surface-safety
        run: packwiz update surface-safety

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update surface-safety mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
