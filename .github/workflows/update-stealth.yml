name: Update Stealth

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stealth version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - stealth-updated

jobs:
  update:
    name: Update Stealth in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update stealth
        run: packwiz update stealth

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update stealth mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
