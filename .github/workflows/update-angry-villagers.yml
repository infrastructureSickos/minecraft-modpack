name: Update Angry Villagers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Angry Villagers version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - angry-villagers-updated

jobs:
  update:
    name: Update Angry Villagers in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update angry-villagers
        run: packwiz update angry-villagers

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update angry-villagers mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
