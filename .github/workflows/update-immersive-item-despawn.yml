name: Update Immersive Item Despawn

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Immersive Item Despawn version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - immersive-item-despawn-updated

jobs:
  update:
    name: Update Immersive Item Despawn in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update immersive-item-despawn
        run: packwiz update immersive-item-despawn

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update immersive-item-despawn mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
