name: Update Water Growth

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Water Growth version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - water-growth-updated

jobs:
  update:
    name: Update Water Growth in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update water-growth
        run: packwiz update water-growth

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update water-growth mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
