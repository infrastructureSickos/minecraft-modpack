name: Update Dangerous Sand

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Dangerous Sand version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - dangerous-sand-updated

jobs:
  update:
    name: Update Dangerous Sand in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update dangerous-sand
        run: packwiz update dangerous-sand

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dangerous-sand mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
