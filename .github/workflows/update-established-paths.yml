name: Update Established Paths

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Established Paths version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - established-paths-updated

jobs:
  update:
    name: Update Established Paths in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update established-paths
        run: packwiz update established-paths

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update established-paths mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
