name: Update Rootways

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Rootways version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - rootways-updated

jobs:
  update:
    name: Update Rootways in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update rootways
        run: packwiz update rootways

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update rootways mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
