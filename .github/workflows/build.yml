name: Build Modpack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build .mrpack
        run: ./build.sh
        env:
          PACKWIZ_BIN: packwiz

      - name: Upload .mrpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfrastructureSickos-mrpack
          path: dist/InfrastructureSickos.mrpack
          if-no-files-found: error
