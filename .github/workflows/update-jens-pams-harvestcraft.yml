name: Update Jens Pams Harvestcraft

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Jens Pams Harvestcraft version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - jens-pams-harvestcraft-updated

jobs:
  update:
    name: Update Jens Pams Harvestcraft in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update jens-pams-harvestcraft
        run: packwiz update jens-pams-harvestcraft

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update jens-pams-harvestcraft mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
