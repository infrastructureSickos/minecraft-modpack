name: Update Portal Pool

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Portal Pool version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - portal-pool-updated

jobs:
  update:
    name: Update Portal Pool in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update portal-pool
        run: packwiz update portal-pool

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update portal-pool mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
