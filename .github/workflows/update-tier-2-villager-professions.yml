name: Update Tier 2 Villager Professions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tier 2 Villager Professions version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - tier-2-villager-professions-updated

jobs:
  update:
    name: Update Tier 2 Villager Professions in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update tier-2-villager-professions
        run: packwiz update tier-2-villager-professions

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tier-2-villager-professions mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
